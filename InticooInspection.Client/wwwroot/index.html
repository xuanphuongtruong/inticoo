<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InticooInspection.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="logo.png" />
    <link href="InticooInspection.Client.styles.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">ðŸ—™</span>
    </div>
    <div id="app-updated-notification" style="display:none; position:fixed; bottom:20px; right:20px; background:white; padding:15px; border:1px solid #2196F3; z-index:1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    Một bản cập nhật mới đã sẵn sàng.
    <button class="btn btn-primary" onclick="location.reload()">Cập nhật ngay</button>
    </div>
        <script src="_framework/blazor.webassembly.js"></script>
    </body>
    <script>
    navigator.serviceWorker.register('service-worker.js');
    </script>
    <script>
    navigator.serviceWorker.register('service-worker.js').then(registration => {
        registration.onupdatefound = () => {
            const installingWorker = registration.installing;
            installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                        // Hiện thông báo khi có bản cập nhật mới
                        document.getElementById('app-updated-notification').style.display = 'block';
                    }
                }
            };
        };
    });
</script>
</html>
